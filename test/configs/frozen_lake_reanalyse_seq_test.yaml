verbose: true

running:
  running_mode: "sequential"
  num_gamers: 2
  training_steps: 3
  sequential:
    num_games_per_step: 2

cache:
  enabled: true
  max_size: 500

data:
  player_dependent_value: false

learning:
  replay_buffer:
    window_size: 500
    leak_chance: 0.0
    reanalyse:
      enabled: true
      num_workers: 1
      positions_per_step: 6
      min_buffer_fill_ratio: 0.0
      compress_games: false
      search:
        simulation:
          mcts_simulations: 6
  learning_method: "samples"
  value_loss: "SE"
  policy_loss: "CE"
  normalize_ce: true
  samples:
    batch_size: 16
    num_samples: 8
    late_heavy: false

optimizer:
  type: "Adam"

scheduler:
  type: step
  start_lr: 1.0e-3
  boundaries: [100]
  gamma: 0.1

search:
  simulation:
    mcts_simulations: 4
    keep_subtree: false
    parallel_search: true
    parallel:
      num_search_threads: 2
      virtual_loss: 3.0
  uct:
    pb_c_base: 10000
    pb_c_init: 1.15
  exploration:
    number_of_softmax_moves: 5
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.003
    value_factor: 1.0
    root_exploration_distribution: "dirichlet"
    root_exploration_fraction: 0.25
    root_dist_alpha: 0.3
