verbose: true

running:
  running_mode: "sequential"
  training_steps: 100
  num_gamers: 6
  sequential:
    num_games_per_step: 12
cache:
  enabled: true
  max_size: 8000
data:
  observation_format: "channels_last"
  network_input_format: "channels_first"
  player_dependent_value: true
learning:
  replay_buffer:
    window_size: 15000
    leak_chance: 0.00001
    reanalyse:
      num_workers: 2
      positions_per_step: 12
      min_buffer_fill_ratio: 0.35
      search:
        simulation:
          mcts_simulations: 200
  learning_method: "samples"
  value_loss: "SE"
  policy_loss: "CE"
  samples:
    batch_size: 32
    num_samples: 32
    late_heavy: true
optimizer:
  optimizer_choice: "Adam"
scheduler:
  starting_lr: 0.001
  boundaries: [10000]
  gamma: 0.1
search:
  simulation:
    mcts_simulations: 100
    keep_subtree: true
  uct:
    pb_c_base: 10000
    pb_c_init: 2.0
  exploration:
    number_of_softmax_moves: 0
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.0
    value_factor: 1.0
    root_exploration_distribution: "gamma"
    root_exploration_fraction: 0.15
    root_dist_alpha: 0.15
