running:
  running_mode: "sequential"
  num_groups: 1
  workers_per_group: 1
  early_fill_per_type: 2
  training_steps: 10
  early_softmax_moves: 100
  early_softmax_exploration: 1.0
  early_random_exploration: 0.0
  sequential:
    num_games_per_type_per_step: 2

cache:
  enabled: false

learning:
  player_dependent_value: true
  shared_storage_size: 3
  replay_window_size: 500
  learning_method: "epochs"
  value_loss: "SE"
  policy_loss: "KLD"
  normalize_cel: false
  epochs:
    batch_size: 32
    learning_epochs: 1
  samples:
    batch_size: 32
    num_samples: 100
    late_heavy: false
    with_replacement: true

optimizer:
  optimizer_choice: "Adam"
  sgd:
    weight_decay: 0.0001
    momentum: 0.9
    nesterov: true

scheduler:
  starting_lr: 0.001
  boundaries: [100]
  gamma: 0.1

search:
  simulation:
    mcts_simulations: 8
    keep_subtree: false
  uct:
    pb_c_base: 10000
    pb_c_init: 1.15
  exploration:
    number_of_softmax_moves: 5
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.003
    value_factor: 1.0
    root_exploration_distribution: "dirichlet"
    root_exploration_fraction: 0.25
    root_dist_alpha: 0.3
    root_dist_beta: 1.0
