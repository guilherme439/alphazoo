running:
  running_mode: "sequential"
  num_groups: 1
  workers_per_group: 4
  training_steps: 5
  early_fill_per_type: 0
  early_softmax_moves: 12
  early_softmax_exploration: 0.5
  early_random_exploration: 0.5
  sequential:
    num_games_per_type_per_step: 12

cache:
  enabled: true
  max_size: 8000

learning:
  player_dependent_value: true
  shared_storage_size: 3
  replay_window_size: 500
  learning_method: "samples"
  value_loss: "SE"
  policy_loss: "KLD"
  samples:
    batch_size: 32
    num_samples: 16
    with_replacement: true
    late_heavy: false

optimizer:
  optimizer_choice: "Adam"

scheduler:
  starting_lr: 0.001
  boundaries: [100]
  gamma: 0.1

search:
  simulation:
    mcts_simulations: 50
    keep_subtree: true
  uct:
    pb_c_base: 10000
    pb_c_init: 1.15
  exploration:
    number_of_softmax_moves: 15
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.003
    value_factor: 1.0
    root_exploration_distribution: "gamma"
    root_exploration_fraction: 0.20
    root_dist_alpha: 0.15
    root_dist_beta: 1.0
