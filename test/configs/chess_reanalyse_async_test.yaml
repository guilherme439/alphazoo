verbose: true

running:
  running_mode: "asynchronous"
  num_gamers: 3
  training_steps: 6
  asynchronous:
    update_delay: 20
    min_num_games: 2

cache:
  enabled: false

data:
  player_dependent_value: true

learning:
  replay_buffer:
    window_size: 1000
    leak_chance: 0.0
    reanalyse:
      enabled: true
      num_workers: 1
      positions_per_step: 4
      min_buffer_fill_ratio: 0.0
      compress_games: true
      search:
        simulation:
          mcts_simulations: 4
  learning_method: "epochs"
  value_loss: "SE"
  policy_loss: "KLD"
  normalize_ce: false
  epochs:
    batch_size: 16
    learning_epochs: 1

optimizer:
  type: "Adam"

scheduler:
  type: sin
  min_lr: 5.0e-5
  max_lr: 1.5e-4
  start_period: 500
  steps_covered: 2000

search:
  simulation:
    mcts_simulations: 10
    keep_subtree: false
  uct:
    pb_c_base: 10000
    pb_c_init: 1.15
  exploration:
    number_of_softmax_moves: 5
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.003
    value_factor: 1.0
    root_exploration_distribution: "dirichlet"
    root_exploration_fraction: 0.25
    root_dist_alpha: 0.3
