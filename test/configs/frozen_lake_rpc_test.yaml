verbose: true

running:
  running_mode: "asynchronous"
  inference_backend: "rpc"
  num_gamers: 2
  training_steps: 3
  asynchronous:
    update_delay: 15
    min_num_games: 2

cache:
  enabled: true
  max_size: 256

data:
  player_dependent_value: false

learning:
  replay_buffer:
    window_size: 500
    leak_chance: 0.0
  learning_method: "epochs"
  value_loss: "SE"
  policy_loss: "KLD"
  normalize_ce: false
  epochs:
    batch_size: 16
    learning_epochs: 1

optimizer:
  type: "Adam"

scheduler:
  type: step
  start_lr: 1.0e-3
  boundaries: [100]
  gamma: 0.1

search:
  simulation:
    mcts_simulations: 6
    keep_subtree: false
    parallel_search: true
    parallel:
      num_search_threads: 2
      virtual_loss: 3.0
  uct:
    pb_c_base: 10000
    pb_c_init: 1.15
  exploration:
    number_of_softmax_moves: 5
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.003
    value_factor: 1.0
    root_exploration_distribution: "dirichlet"
    root_exploration_fraction: 0.25
    root_dist_alpha: 0.3
