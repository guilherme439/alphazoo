verbose: true

running:
  running_mode: "sequential"
  num_gamers: 1
  training_steps: 10
  sequential:
    num_games_per_step: 2

cache:
  enabled: false

data:
  player_dependent_value: true

learning:
  replay_buffer:
    window_size: 500
    leak_chance: 0.0
  learning_method: "epochs"
  value_loss: "SE"
  policy_loss: "KLD"
  normalize_ce: false
  epochs:
    batch_size: 16
    learning_epochs: 1

optimizer:
  optimizer_choice: "Adam"

scheduler:
  starting_lr: 0.001
  boundaries: [100]
  gamma: 0.1

search:
  simulation:
    mcts_simulations: 8
    keep_subtree: false
    parallel_search: true
    parallel:
      num_search_threads: 2
      virtual_loss: 3.0
  uct:
    pb_c_base: 10000
    pb_c_init: 1.15
  exploration:
    number_of_softmax_moves: 5
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.003
    value_factor: 1.0
    root_exploration_distribution: "dirichlet"
    root_exploration_fraction: 0.25
    root_dist_alpha: 0.3
