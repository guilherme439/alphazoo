verbose: true

running:
  running_mode: "sequential"
  num_gamers: 1
  early_fill_games: 2
  training_steps: 3
  early_softmax_moves: 1
  early_softmax_exploration: 1.0
  early_random_exploration: 0.0
  sequential:
    num_games_per_step: 2

cache:
  enabled: false

data:
  player_dependent_value: true

learning:
  replay_window_size: 500
  learning_method: "epochs"
  value_loss: "SE"
  policy_loss: "KLD"
  normalize_cel: false
  epochs:
    batch_size: 16
    learning_epochs: 1

optimizer:
  optimizer_choice: "Adam"

scheduler:
  starting_lr: 0.001
  boundaries: [100]
  gamma: 0.1

search:
  simulation:
    mcts_simulations: 4
    keep_subtree: false
  uct:
    pb_c_base: 10000
    pb_c_init: 1.15
  exploration:
    number_of_softmax_moves: 3
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.003
    value_factor: 1.0
    root_exploration_distribution: "dirichlet"
    root_exploration_fraction: 0.25
    root_dist_alpha: 0.3
