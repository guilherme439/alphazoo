verbose: true

data:
  observation_format: "channels_last"
  network_input_format: "channels_first"
  player_dependent_value: true

running:
  running_mode: "sequential"
  num_gamers: 8
  training_steps: 500
  early_fill_games: 100
  early_softmax_moves: 12
  early_softmax_exploration: 0.5
  early_random_exploration: 0.5
  sequential:
    num_games_per_step: 12
  asynchronous:
    update_delay: 120

cache:
  enabled: true
  max_size: 8000

recurrent:
  train_iterations: 3
  pred_iterations: 3
  test_iterations: 1
  use_progressive_loss: true
  prog_alpha: 0.5

learning:
  replay_window_size: 10000
  learning_method: "samples"
  value_loss: "SE"
  policy_loss: "CEL"
  normalize_cel: false
  samples:
    batch_size: 64
    num_samples: 128
    with_replacement: true
    late_heavy: true
  epochs:
    batch_size: 2048
    learning_epochs: 1

optimizer:
  optimizer_choice: "Adam"
  sgd:
    weight_decay: 0.0000001
    momentum: 0.9
    nesterov: true

scheduler:
  starting_lr: 0.001
  boundaries: [10000, 20000]
  gamma: 0.2

search:
  simulation:
    mcts_simulations: 100
    keep_subtree: true
    parallel_search: false
    parallel:
      num_search_threads: 4
      virtual_loss: 3.0
  uct:
    pb_c_base: 10000
    pb_c_init: 1.15
  exploration:
    number_of_softmax_moves: 15
    epsilon_softmax_exploration: 0.04
    epsilon_random_exploration: 0.003
    value_factor: 1.0
    root_exploration_distribution: "gamma"
    root_exploration_fraction: 0.20
    root_dist_alpha: 0.15
    root_dist_beta: 1.0
